name: MacAllYouNeed
options:
  bundleIdPrefix: com.macallyouneed
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

configFiles:
  Debug: Config/Signing.xcconfig
  Release: Config/Signing.xcconfig

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 2N55H39FC4
    ENABLE_HARDENED_RUNTIME: YES
  configs:
    Debug:
      # Matches scripts/ci-build.sh — Debug builds must not require per-extension
      # provisioning profiles (e.g. com.macallyouneed.app.finderhistory).
      CODE_SIGNING_ALLOWED: NO

packages:
  Shared:
    path: Shared
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio
    exactVersion: 0.14.5

targets:

  MacAllYouNeed:
    type: application
    platform: macOS
    sources:
      - path: MacAllYouNeed
      - path: Resources/Migration
        type: folder
    info:
      path: MacAllYouNeed/Info.plist
      properties:
        CFBundleName: MacAllYouNeed
        CFBundleIconFile: AppIcon
        CFBundleIconName: AppIcon
        MAYNKeychainAccessGroup: "$(AppIdentifierPrefix)com.macallyouneed.shared"
        MAYNTeamIdentifier: "$(DEVELOPMENT_TEAM)"
        NSMicrophoneUsageDescription: MacAllYouNeed needs microphone access for voice dictation.
        NSRemindersFullAccessUsageDescription: MacAllYouNeed saves spoken reminders to Apple Reminders.
        NSAppleEventsUsageDescription: Mac All You Need reads the front Finder window folder for your folder history when Accessibility cannot resolve the path.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.macallyouneed.app
        CODE_SIGN_ENTITLEMENTS: MacAllYouNeed/MacAllYouNeed.entitlements
    dependencies:
      - package: Shared
        product: Core
      - package: Shared
        product: UI
      - package: Shared
        product: Platform
      - package: Shared
        product: FeatureCore
      - package: Shared
        product: PackPipeline
      - package: FluidAudio
        product: FluidAudio
      - target: ClipboardDaemon
        embed: false
        copy: false
      - target: FolderPreview
        embed: true
        codeSign: true
      - target: FinderHistoryExtension
        embed: true
        codeSign: true
      # RemindersWidget is not embedded here — needs its own provisioning profile.
      # - target: RemindersWidget
      #   embed: true
      #   codeSign: true
    postBuildScripts:
      - name: "Embed ClipboardDaemon in LoginItems"
        basedOnDependencyAnalysis: false
        script: |
          set -e
          DEST="${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Library/LoginItems"
          mkdir -p "$DEST"
          if [ -d "${BUILT_PRODUCTS_DIR}/ClipboardDaemon.app" ]; then
            cp -Rf "${BUILT_PRODUCTS_DIR}/ClipboardDaemon.app" "$DEST/"
          fi
      - name: "Copy downloader binaries to Resources"
        basedOnDependencyAnalysis: false
        script: |
          set -e
          RES="${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}"
          if [ ! -f "${SRCROOT}/Vendored/binaries/yt-dlp" ]; then
            echo "error: Missing Vendored/binaries/yt-dlp. Run scripts/fetch-binaries.sh first." >&2
            exit 1
          fi
          cp "${SRCROOT}/Vendored/binaries/yt-dlp" "${RES}/yt-dlp"
          cp "${SRCROOT}/Vendored/binaries/ffmpeg" "${RES}/ffmpeg"
          cp "${SRCROOT}/Vendored/binaries/manifest.json" "${RES}/downloader-manifest.json"

  TypelessImport:
    type: tool
    platform: macOS
    sources:
      - Tools/TypelessImport
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.macallyouneed.typeless-import
        CODE_SIGN_ENTITLEMENTS: Tools/TypelessImport/TypelessImport.entitlements
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_MAYNKeychainAccessGroup: "$(AppIdentifierPrefix)com.macallyouneed.shared"
        INFOPLIST_KEY_MAYNTeamIdentifier: "$(DEVELOPMENT_TEAM)"
    dependencies:
      - package: Shared
        product: Core

  VoiceTrainingExport:
    type: tool
    platform: macOS
    sources:
      - Tools/VoiceTrainingExport
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.macallyouneed.voice-training-export
        CODE_SIGN_ENTITLEMENTS: Tools/VoiceTrainingExport/VoiceTrainingExport.entitlements
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_MAYNKeychainAccessGroup: "$(AppIdentifierPrefix)com.macallyouneed.shared"
        INFOPLIST_KEY_MAYNTeamIdentifier: "$(DEVELOPMENT_TEAM)"
    dependencies:
      - package: Shared
        product: Core

  MacAllYouNeedTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: MacAllYouNeedTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.macallyouneed.app.tests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: MacAllYouNeed

  ClipboardDaemon:
    type: application
    platform: macOS
    sources:
      - path: ClipboardDaemon
    info:
      path: ClipboardDaemon/Info.plist
      properties:
        CFBundleName: ClipboardDaemon
        LSUIElement: YES
        LSBackgroundOnly: YES
        MAYNKeychainAccessGroup: "$(AppIdentifierPrefix)com.macallyouneed.shared"
        MAYNTeamIdentifier: "$(DEVELOPMENT_TEAM)"
        NSHumanReadableCopyright: ""
        MachServices:
          "group.com.macallyouneed.shared.daemon": true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.macallyouneed.app.daemon
        CODE_SIGN_ENTITLEMENTS: ClipboardDaemon/ClipboardDaemon.entitlements
    dependencies:
      - package: Shared
        product: Core
      - package: Shared
        product: Platform
      - package: Shared
        product: FeatureCore

  FolderPreview:
    type: app-extension
    platform: macOS
    attributes:
      DevelopmentTeam: 2N55H39FC4
      ProvisioningStyle: Automatic
    sources:
      - path: FolderPreview
    info:
      path: FolderPreview/Info.plist
      properties:
        CFBundleName: FolderPreview
        NSExtension:
          NSExtensionPointIdentifier: com.apple.quicklook.preview
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).PreviewViewController"
          NSExtensionAttributes:
            QLSupportedContentTypes:
              - public.folder
              - public.zip-archive
              - org.7-zip.7-zip-archive
              - com.rarlab.rar-archive
              - public.tar-archive
              - org.gnu.gnu-zip-archive
              - public.bzip2-archive
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.macallyouneed.app.folderpreview
        CODE_SIGN_ENTITLEMENTS: FolderPreview/FolderPreview.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 2N55H39FC4
    dependencies:
      - package: Shared
        product: Core
      - package: Shared
        product: Platform
      - package: Shared
        product: FeatureCore

  FinderHistoryExtension:
    type: app-extension
    platform: macOS
    attributes:
      DevelopmentTeam: 2N55H39FC4
      ProvisioningStyle: Automatic
    sources:
      - path: FinderHistoryExtension
    info:
      path: FinderHistoryExtension/Info.plist
      properties:
        CFBundleName: FinderHistoryExtension
        NSExtension:
          NSExtensionPointIdentifier: com.apple.FinderSync
          NSExtensionPrincipalClass: FinderSyncExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.macallyouneed.app.finderhistory
        CODE_SIGN_ENTITLEMENTS: FinderHistoryExtension/FinderHistoryExtension.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 2N55H39FC4
    dependencies:
      - package: Shared
        product: Core

  RemindersWidget:
    type: app-extension
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: RemindersWidget
    info:
      path: RemindersWidget/Info.plist
      properties:
        CFBundleName: RemindersWidget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.macallyouneed.app.reminderswidget
        CODE_SIGN_ENTITLEMENTS: RemindersWidget/RemindersWidget.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 2N55H39FC4
    dependencies:
      - package: Shared
        product: Core
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework

schemes:
  TypelessImport:
    build:
      targets:
        TypelessImport: all
  VoiceTrainingExport:
    build:
      targets:
        VoiceTrainingExport: all
